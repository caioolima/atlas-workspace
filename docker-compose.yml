services:
  postgres:
    image: postgres:16-alpine
    container_name: notion-ai-collab-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: notion_ai
      POSTGRES_USER: notion
      POSTGRES_PASSWORD: notion
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
